<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>منصة بسيطة | حلول رقمية مبتكرة</title>
    
    <!-- Mayor Captcha -->
    <script src="https://mayor-cloud.com/static/captcha/widget.js"></script>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f8fafc 0%, #eff3f8 100%);
            color: #0a1e2f;
            line-height: 1.5;
            scroll-behavior: smooth;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        .navbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; padding: 20px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #1e4b6e, #2b7a62); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.3px; }
        .logo i { color: #2b7a62; margin-left: 8px; font-size: 1.6rem; }
        .nav-links { display: flex; gap: 32px; list-style: none; }
        .nav-links a { text-decoration: none; font-weight: 500; color: #1e3a4d; transition: 0.2s; }
        .nav-links a:hover { color: #2b7a62; }
        .hero { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 40px; padding: 60px 0 40px; }
        .hero-content { flex: 1; min-width: 260px; }
        .hero-badge { background: #e0f0ec; display: inline-block; padding: 6px 16px; border-radius: 40px; font-size: 0.85rem; font-weight: 600; color: #1b6b56; margin-bottom: 20px; }
        .hero-content h1 { font-size: 3.2rem; font-weight: 800; line-height: 1.2; margin-bottom: 20px; color: #0a2a38; }
        .hero-content p { font-size: 1.15rem; color: #2c4b5e; margin-bottom: 32px; max-width: 90%; }
        .btn-group { display: flex; gap: 16px; flex-wrap: wrap; }
        .btn-primary { background: #1e5a4c; color: white; border: none; padding: 12px 32px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .btn-outline { background: transparent; border: 1.5px solid #1e5a4c; color: #1e5a4c; padding: 12px 32px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .hero-image i { font-size: 14rem; color: #cbdde6; }
        .stats { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 30px; background: white; padding: 40px 32px; border-radius: 48px; margin: 40px 0; }
        .stat-number { font-size: 2.2rem; font-weight: 800; color: #1e5a4c; }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 30px; margin-bottom: 50px; }
        .feature-card { background: white; padding: 30px 20px; border-radius: 32px; text-align: center; }
        .demo-box { background: linear-gradient(125deg, #eef5f2, #ffffff); border-radius: 40px; padding: 40px 30px; margin: 50px 0; text-align: center; }
        .interactive-area { display: flex; align-items: center; justify-content: center; gap: 25px; flex-wrap: wrap; margin-top: 20px; }
        .counter-display { background: #1e3a4d; color: white; font-size: 3rem; padding: 20px 32px; border-radius: 60px; }
        footer { background: #0a242f; color: #cbdae2; padding: 40px 0 30px; margin-top: 70px; border-radius: 40px 40px 0 0; }
    </style>
</head>
<body>

    <!-- الكابتشا اللي بعثتها بالضبط -->
    <div id="mayor-captcha"></div>
    <input type="hidden" name="captcha_token" id="captcha_token" />

    <div class="container">
        <!-- باقي المحتوى (Navbar + Hero + Stats + Features + Demo) -->
        <div class="navbar">
            <div class="logo"><i class="fas fa-cube"></i> أفق<span style="color:#2b7a62">تك</span></div>
            <ul class="nav-links">
                <li><a href="#">الرئيسية</a></li>
                <li><a href="#">المميزات</a></li>
                <li><a href="#">المشاريع</a></li>
                <li><a href="#">تواصل</a></li>
            </ul>
        </div>

        <div class="hero">
            <div class="hero-content">
                <div class="hero-badge"><i class="fas fa-bolt"></i> حلول ذكية للمستقبل</div>
                <h1>ابتكار رقمي <br> يبدأ من هنا</h1>
                <p>منصة متكاملة تقدم تجربة سلسة، أداء استثنائي، وتصاميم حديثة.</p>
                <div class="btn-group">
                    <button class="btn-primary" id="exploreBtn">استكشف الآن</button>
                    <button class="btn-outline" id="contactTrigger">تواصل معنا</button>
                </div>
            </div>
            <div class="hero-image"><i class="fas fa-chalkboard-user"></i></div>
        </div>

        <!-- Stats, Features, Demo ... (كمل باقي الأقسام من الكود الأصلي إذا تبغى) -->
    </div>

    <!-- تشغيل الكابتشا -->
    <script>
      MayorCaptcha.render('#mayor-captcha', {
        siteKey: 'j3RYzdyLOl7oWNcZRZenKHUv2IHH3VhL9J3iy8tVGro',
        theme: 'light',
        callback: function(token) {
          document.getElementById('captcha_token').value = token;
          console.log('Token received:', token);
        }
      });
    </script>

</body>
</html>
