<link rel="stylesheet" href="https://mayor-cloud.com/static/captcha/widget.css?v=20260330-3">

<div id="mayor-captcha"></div>
<input type="hidden" id="captcha_token" name="captcha_token">

<script src="https://mayor-cloud.com/static/captcha/widget.js?v=20260330-3"></script>
<script>
  MayorCaptcha.render('#mayor-captcha', {
    assetBase: 'https://mayor-cloud.com',
    apiBase: 'https://mayor-cloud.com/api/captcha/v1',
    siteKey: 'YOUR_SITE_KEY',
    theme: 'light',
    callback: function(token) {
      document.getElementById('captcha_token').value = token;
    }
  });
</script>
